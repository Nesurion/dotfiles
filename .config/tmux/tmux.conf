# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-b
bind C-b send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -sg extended-keys on
set -as terminal-features 'xterm-256color:RGB'
set -g default-terminal "tmux-256color"

# ── Window/Pane numbering ─────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (ALT+hjkl, mirrors WezTerm) ───────────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane resizing (prefix + hjkl, repeatable) ────────────────────────────────
bind -r h resize-pane -L 10
bind -r j resize-pane -D 10
bind -r k resize-pane -U 10
bind -r l resize-pane -R 10

# ── Zoom (ALT+Enter, mirrors WezTerm) ─────────────────────────────────────────
bind -n M-Enter resize-pane -Z

# ── Swap panes (prefix+p, mirrors WezTerm LEADER+p) ──────────────────────────
bind p display-panes \; command-prompt -p "Swap with pane #:" "swap-pane -t '%%'"

# ── Copy mode (vi-style, prefix+c mirrors WezTerm LEADER+c) ──────────────────
setw -g mode-keys vi
bind c copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Scroll (PageUp/PageDown mirrors WezTerm) ──────────────────────────────────
bind -n PageUp copy-mode \; send -X halfpage-up
bind -n PageDown copy-mode \; send -X halfpage-down

# ── Mouse scroll speed (1 line per tick in copy mode) ─────────────────────────
bind -n WheelUpPane if -F "#{mouse_any_flag}" "send -M" "if -F '#{pane_in_mode}' 'send -M' 'copy-mode -e'"
bind -n WheelDownPane if -F "#{mouse_any_flag}" "send -M" "send -M"
bind -T copy-mode-vi WheelUpPane send -N1 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N1 -X scroll-down

# ── Session switcher (Option+T via tmuxier) ───────────────────────────────────
bind -n M-t display-popup -E -w 60% -h 60% "tmuxier -dirs $HOME/dev,$HOME/dev-sap,$HOME/obsidian,$HOME/iris-docs,$HOME/.config -fzf-args '--reverse'"

# ── Switch to last session
bind -n M-C-t switch-client -l

# ── New named session
bind -n C-T command-prompt -p "New session name:" "new-session -s '%%' -c '#{pane_current_path}'"

# ── Close pane (CMD+w not available in tmux; use prefix+x) ───────────────────
bind x kill-pane

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar — Tokyo Night Moon ─────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#1e2030,fg=#c8d3f5"
set -g status-left-length 40
set -g status-right-length 120

# Left: session name (mirrors tabline_b workspace)
set -g status-left "#[bg=#82aaff,fg=#1e2030,bold] #S #[bg=#1e2030,fg=#82aaff] "

# Window tabs
set -g window-status-separator ""
set -g window-status-format "#[fg=#636da6,bg=#1e2030] #I "
set -g window-status-current-format "#[bg=#2f334d,fg=#1e2030]#[fg=#c8d3f5,bg=#2f334d] #{b:pane_current_path}#{?window_zoomed_flag, [Z],} #[fg=#2f334d,bg=#1e2030]"

# Right: git branch + cwd (mirrors tabline_x git_branch_component)
set -g status-right "#[fg=#636da6]#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | xargs -I{} echo ' {}')#[fg=#c8d3f5]  #{b:pane_current_path} "

# Pane borders
set -g pane-border-style "fg=#2f334d"
set -g pane-active-border-style "fg=#82aaff"

# Inactive pane dimming (mirrors WezTerm inactive_pane_hsb)
set -g window-style "fg=#4a5278,bg=#13131f"
set -g window-active-style "fg=#c8d3f5,bg=#1e2030"

# ── TPM plugins ───────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'

set -g @tpm-clean 'U'

run '~/.tmux/plugins/tpm/tpm'
